<!DOCTYPE html>
<html lang="en">
<head>
    <title>Research RAG</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
    window.MathJax = {
        tex:{inlineMath:[['$','$'],['\\(','\\)']], displayMath:[['$$','$$'],['\\[','\\]']]}
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <div class="logo">
                <h1>
                Research<span>RAG</span>
                </h1>
            </div>
        </header>

        <main class="content-split">
            <section class="chat-section">
                <div id="chat-window" class="scroll-area">
                    <div class="msg ai">
                        Hi! I'm ready to analyze your research papers. Ask me about specific equations or data tables.
                    </div>
                </div>
                <div id="loading">Thinking response...</div>
                <div class="input-area">
                    <form id="chat-form">
                        <input type="text" id="user-input" placeholder="Type your question about the paper here..." autocomplete="off">
                        <button type="submit">Ask</button>
                    </form>
                </div>
            </section>


            <section class="artifact-section">
                <div class="sidebar-header">
                    <h2>Found Images & Tables</h2>
                </div>
                <div id="artifact-list" class="scroll-area">
                     <h2>Relevant Tables</h2>
                    <div class="card">
                        <div id="tables-container" class="card-content">       </div>
                    </div>


                     <h2>Relevant Images</h2>
                    <div class="card">
                        <div id="images-container" class="image-placeholder"></div>
                    </div>
                    <div id="source"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
